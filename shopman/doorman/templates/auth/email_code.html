{% load i18n %}<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: sans-serif; max-width: 480px; margin: 0 auto; padding: 24px;">
  <h2 style="color: #333;">{% translate "Verification Code" %}</h2>
  <p style="font-size: 32px; font-weight: bold; letter-spacing: 8px; color: #111; background: #f5f5f5; padding: 16px; text-align: center; border-radius: 8px;">
    {{ code }}
  </p>
  <p style="color: #666;">
    {% blocktranslate with ttl=ttl_minutes %}This code expires in {{ ttl }} minutes.{% endblocktranslate %}
  </p>
  <p style="color: #999; font-size: 12px;">
    {% translate "If you did not request this code, you can safely ignore this email." %}
  </p>
</body>
</html>
