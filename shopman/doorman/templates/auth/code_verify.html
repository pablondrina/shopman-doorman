<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar codigo</title>
</head>
<body>
    <h1>Verificar codigo</h1>

    <p>Enviamos um codigo para <strong>{{ phone }}</strong>.</p>

    {% if error %}
    <p style="color: red;">{{ error }}</p>
    {% endif %}

    {% if attempts_remaining is not None and attempts_remaining <= 2 %}
    <p style="color: orange;">{{ attempts_remaining }} tentativa(s) restante(s).</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="phone" value="{{ phone }}">
        <label for="code">Codigo:</label>
        <input type="text" id="code" name="code" maxlength="6"
               pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code"
               placeholder="000000" required autofocus>
        <button type="submit">Verificar</button>
    </form>
</body>
</html>
